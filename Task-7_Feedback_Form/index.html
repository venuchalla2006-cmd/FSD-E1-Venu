<!DOCTYPE html>
<html>
<head>
<title>Feedback Form</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body>

<h2>Customer Feedback Form</h2>

<form id="feedbackForm">

<label>Name:</label>
<input type="text" id="name" onkeyup="validateName()" placeholder="Enter your name">
<span id="nameError"></span>

<br><br>

<label>Email:</label>
<input type="text" id="email" onkeyup="validateEmail()" placeholder="Enter your email">
<span id="emailError"></span>

<br><br>

<label>Feedback:</label>
<textarea id="feedback"></textarea>

<br><br>

<button type="button" ondblclick="submitForm()">Submit</button>

</form>

</body>
</html>
